<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
	<title>Clash Proxy</title>
	<meta name="description" content="Clash Proxy — A fast, premium privacy-focused web proxy for secure browsing." />
	<meta name="theme-color" content="#0a0a0f" />
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

	<!-- Google Fonts: Inter (thick, modern, bold) -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

	<!-- Scramjet v2 Engine + Controller (IIFE bundles, must load before app) -->
	<script src="/scramjet/scramjet.js"></script>
	<script src="/controller/controller.api.js"></script>

	<!-- Styles -->
	<link rel="stylesheet" href="styles.css" />

	<!-- App Scripts (deferred) -->
	<script src="config.js" defer></script>
	<script src="search.js" defer></script>
	<script src="particles.js" defer></script>
	<script src="games-data.js" defer></script>
	<script src="app.js" defer></script>
	<script src="music.js" defer></script>
</head>

<body>
	<!-- Animated particle background -->
	<canvas id="particle-canvas"></canvas>

	<!-- Sidebar -->
	<aside id="sidebar" class="sidebar">
		<div class="sidebar-header">
			<span class="sidebar-logo">⚡</span>
			<span class="sidebar-title">Menu</span>
			<button id="sidebar-close-btn" class="sidebar-close" aria-label="Close menu">&times;</button>
		</div>

		<nav class="sidebar-nav">
			<a href="#" id="nav-proxy" class="sidebar-link active" data-page="proxy">
				<span class="sidebar-icon">🌐</span>
				<span>Proxy</span>
			</a>

			<a href="#" id="nav-games" class="sidebar-link" data-page="games">
				<span class="sidebar-icon">🎮</span>
				<span>Games</span>
			</a>
			<a href="#" id="nav-settings" class="sidebar-link disabled" data-page="settings">
				<span class="sidebar-icon">⚙️</span>
				<span>Settings</span>
				<span class="badge">Soon</span>
			</a>
		</nav>

		<div class="sidebar-footer">
			<span class="sidebar-version">v2.0.0</span>
		</div>
	</aside>

	<!-- Sidebar overlay (for mobile) -->
	<div id="sidebar-overlay" class="sidebar-overlay"></div>

	<!-- ============================================================
	     Browser Chrome (visible when browsing)
	     ============================================================ -->
	<div id="browser-chrome" class="browser-chrome hidden">
		<!-- Tab Bar -->
		<div class="tab-bar">
			<div id="tab-list" class="tab-list">
				<!-- Tabs are created dynamically by app.js -->
			</div>
			<button id="new-tab-btn" class="new-tab-btn" aria-label="New tab" title="New Tab">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
					<line x1="12" y1="5" x2="12" y2="19"></line>
					<line x1="5" y1="12" x2="19" y2="12"></line>
				</svg>
			</button>
		</div>

		<!-- Navigation Bar -->
		<div class="nav-bar">
			<button id="nav-back-btn" class="nav-btn" aria-label="Back" title="Back">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
					<polyline points="15 18 9 12 15 6"></polyline>
				</svg>
			</button>
			<button id="nav-forward-btn" class="nav-btn" aria-label="Forward" title="Forward">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
					<polyline points="9 6 15 12 9 18"></polyline>
				</svg>
			</button>
			<button id="nav-refresh-btn" class="nav-btn" aria-label="Refresh" title="Refresh">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
					<polyline points="23 4 23 10 17 10"></polyline>
					<path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
				</svg>
			</button>
			<div class="nav-url-wrapper">
				<input type="text" id="nav-url-input" class="nav-url-input" placeholder="Search or enter URL..." spellcheck="false" autocomplete="off" />
			</div>
			<button id="nav-home-btn" class="nav-btn" aria-label="Home" title="Home">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
					<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
					<polyline points="9 22 9 12 15 12 15 22"></polyline>
				</svg>
			</button>
			<button id="nav-fullscreen-btn" class="nav-btn" aria-label="Fullscreen" title="Toggle Fullscreen">
				<svg id="fullscreen-icon-enter" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
					<polyline points="15 3 21 3 21 9"></polyline>
					<polyline points="9 21 3 21 3 15"></polyline>
					<line x1="21" y1="3" x2="14" y2="10"></line>
					<line x1="3" y1="21" x2="10" y2="14"></line>
				</svg>
				<svg id="fullscreen-icon-exit" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
					<polyline points="4 14 10 14 10 20"></polyline>
					<polyline points="20 10 14 10 14 4"></polyline>
					<line x1="14" y1="10" x2="21" y2="3"></line>
					<line x1="3" y1="21" x2="10" y2="14"></line>
				</svg>
			</button>
			<button id="nav-sidebar-btn" class="nav-btn hamburger-nav" aria-label="Menu" title="Menu">
				<span></span><span></span><span></span>
			</button>
		</div>
	</div>

	<!-- Proxy Frames Container (iframes go here) -->
	<div id="frames-container" class="frames-container hidden"></div>

	<!-- Game Theater (overlay for playing games) -->
	<div id="theater" class="theater hidden">
		<div class="theater-toolbar">
			<button id="theater-close" class="theater-btn">&larr; Back</button>
			<span class="theater-title" id="theater-title">Game</span>
			<div class="theater-actions">
				<button id="theater-fullscreen" class="theater-btn" title="Fullscreen">⛶</button>
			</div>
		</div>
		<iframe id="theater-frame" class="theater-frame" allowfullscreen allow="autoplay;fullscreen;gamepad;microphone;camera"></iframe>
	</div>

	<!-- ============================================================
	     Main Content (Landing Page)
	     ============================================================ -->
	<main id="main-content" class="main-content">
		<!-- Top bar -->
		<header class="top-bar">
			<button id="sidebar-toggle-btn" class="hamburger-btn" aria-label="Open menu">
				<span></span>
				<span></span>
				<span></span>
			</button>
			<div class="top-bar-spacer"></div>
			<button id="frog-music-btn" class="hamburger-btn" aria-label="Toggle Music Player" title="Toggle Music Player" style="display: flex; align-items: center; justify-content: center;">
				<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
			</button>
		</header>

		<!-- Hero / Proxy Section -->
		<section id="page-proxy" class="page active">
			<div class="hero">
				<h1 class="hero-title">Clash Proxy.</h1>
				<p class="hero-subtitle">Fast. Private. Unrestricted.</p>

				<form id="proxy-form" class="search-form" autocomplete="off">
					<div class="search-wrapper">
						<span class="search-icon">
							<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
								<circle cx="11" cy="11" r="8"></circle>
								<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
							</svg>
						</span>
						<input
							type="text"
							id="proxy-input"
							class="search-input"
							placeholder="Search the web or enter a URL..."
							spellcheck="false"
							autocomplete="off"
							required
						/>
						<button type="submit" id="proxy-submit-btn" class="search-submit" aria-label="Go">
							<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
								<line x1="5" y1="12" x2="19" y2="12"></line>
								<polyline points="12 5 19 12 12 19"></polyline>
							</svg>
						</button>
					</div>
				</form>

				<!-- Error display -->
				<div id="proxy-error" class="error-display hidden">
					<p id="proxy-error-message" class="error-message"></p>
				</div>

				<!-- Status indicator -->
				<div class="status-bar">
					<span class="status-dot" id="status-dot"></span>
					<span class="status-text" id="status-text">Ready — Enter a URL or search query</span>
				</div>
			</div>
		</section>

		<section id="page-games" class="page">
			<div class="games-page">
				<div class="games-header">
					<h1 class="games-title">Games</h1>
					<div class="games-search-wrapper">
						<input type="text" id="games-search" class="games-search" placeholder="Search games..." spellcheck="false" autocomplete="off" />
						<span class="games-count" id="games-count">0</span>
					</div>
				</div>
				<div id="games-grid" class="games-grid"></div>
			</div>
		</section>

		<section id="page-settings" class="page">
			<div class="hero">
				<h1 class="hero-title">Settings</h1>
				<p class="hero-subtitle">Coming soon.</p>
			</div>
		</section>
	</main>

	<!-- Music Player -->
	<div id="music-player" class="music-minimized music-hidden">
		<div id="music-header">
			<div id="music-now-playing" class="music-compact">
				<img id="music-thumb" src="" alt="">
				<div class="music-info">
					<span id="music-title">No track</span>
					<span id="music-author"></span>
				</div>
			</div>
			<div class="music-header-btns">
				<button id="music-search-toggle" class="music-icon-btn" title="Search">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
				</button>
				<button id="music-toggle-btn" class="music-icon-btn" title="Minimize">
					<svg id="music-toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
				</button>
			</div>
		</div>
		<div id="music-body">
			<div id="music-search-area" class="music-hidden">
				<div class="music-search-wrap">
					<input id="music-search-input" type="text" placeholder="Search songs..." autocomplete="off">
				</div>
				<div id="music-results"></div>
			</div>
			<div id="music-player-area">
				<div id="music-youtube-player"></div>
				<div id="music-controls">
					<div id="music-controls-row">
						<button id="music-prev" title="Previous">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
						</button>
						<button id="music-play-pause" title="Play/Pause">
							<svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
						</button>
						<button id="music-next" title="Next">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-5.5 6l-8.5 6V6z"/></svg>
						</button>
					</div>
					<div id="music-progress">
						<span id="music-time-current">0:00</span>
						<input type="range" id="music-seek" min="0" max="100" value="0">
						<span id="music-time-total">0:00</span>
					</div>
					<div id="music-controls-row2">
						<button id="music-shuffle" title="Shuffle">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
						</button>
						<button id="music-repeat" title="Repeat">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
						</button>
						<button id="music-volume-btn" title="Volume">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
						</button>
						<input type="range" id="music-volume-slider" min="0" max="100" value="100">
						<button id="music-queue-toggle" title="Queue">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
						</button>
					</div>
				</div>
				<div id="music-queue" style="display: none;">
					<div class="music-queue-header">
						<span>Queue</span>
						<span id="music-queue-count">0 songs</span>
					</div>
					<div id="music-queue-list"></div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
